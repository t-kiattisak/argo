# Example of a ClusterSecretStore using AWS Secrets Manager
# Adjust this according to your cloud provider (GCP Secret Manager, HashiCorp Vault, etc.)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1 # เปลี่ยนเป็น region ของคุณ
      # In production, we recommend using IAM Roles for Service Accounts (IRSA)
      # rather than static AWS access keys.
